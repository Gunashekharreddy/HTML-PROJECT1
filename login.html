<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="server.html">
        <fieldset>
        <legend>user details</legend>
        <table>

            <tr>
                <td><label for="">First Name</label></td>
                <td><input type="text" name="name" required id="" placeholder="Reddy"></td>
            </tr>
            <tr>
                <td><label for="">Surname</label></td>
                <td><input type="text" name="surname" required id="" placeholder="Intial"></td>
            </tr>
            <tr>
                <td> <label for="">Mobile Number</label></td>
                <td><input type="tel" name="mobile"  required id="" placeholder="0123456789"></td>
            </tr>
            <tr>
                <td><label for="">Email</label></td>
                <td><input type="email" name="email" required id="" placeholder="guna@gmail.com"></td>
            </tr>
            <tr>
                <td><label for="">Password</label></td>
                <td> <input type="password" name="password" required id=""> </td>
            </tr>
            <tr>
                <td><label for="">Confirm Password</label></td>
                <td><input type="password" name="confirm password" required id=""></td>
            </tr>
        
        
            <tr>
                <td><label for="">Gender</label></td>
                <td>
                    <label for="">Male</label>
                    <input type="radio" name="gender" required id="" value="M">
                    <label for="">Female</label>
                    <input type="radio" name="gender" required id="" value="F">
                    <label for="">Others</label>
                    <input type="radio" name="gender" required id="" value="Others">
                </td>
            </tr>
            <tr>
            <td><label for="">Select Country</label></td>
            <td><select name="" id="">
                <option value="India">India</option>
                <option value="SA">South Africa</option>
                <option value="AUS">Austrila</option>
                <option value="WI" disabled>West Indes</option>
                <option value="SL">Sri Lanka</option>
                <option value="ENG">England</option>
            </select></td>
            </tr>
        <tr>
            <td><label for="">Date of Birth</label></td>
            <td><input type="date" name="dob" id=""></td>
        </tr>
        <tr>
            <td><label for="">Upload Picture</label></td>
            <td><input type="file" name="upload" id=""></td>
        </tr>
        <tr><td><input type="reset" name="reset" id=""></td></tr>
        </table>
    </fieldset>
    <fieldset>
        <legend>Course Details</legend>
        <table>
            <tr>
            <td><label for="">Select Course</label></td>
            <td><select name="" id="">
            <option value="">Python Fullstack</option>
            <option value="">Web devolper</option>
            <option value="">Java Fullstack</option>
            <option value="">Data Analytics</option>
            <option value="">Cloud computing</option>
        </select></td>
        </tr>
        <tr>
            <td><label for="">Delivery Mode</label></td>
            <td><label for="">Online</label>
                <input type="radio" name="Delivery Mode">
                <label for="">Offline</label>
                <input type="radio" name="Delivery Mode">
            </td>
        </tr>
        <tr>
            <td><label for="" required>Institute Name</label></td>
            <td> <input type="text" placeholder="Thopstech"></td>
        </tr>
        <tr><td><label for="">Comments</label></td>
            <td> <textarea name="" id="" rows="2" cols="5"></textarea></td></tr>
        <tr><td><button>Submit</button></td></tr>
        </table>
    </fieldset>
    </form>
</body>
</html>
